<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1226">
<title>Baby Monitor · Live</title>
<style>
  :root{
    --night:#12162b;
    --night-edge:#0b0e1e;
    --panel:rgba(28,34,58,.55);
    --hair:rgba(160,168,214,.14);
    --ink:#edecfb;
    --muted:#8a90bd;
    --glow:#ffb27a;
    --glow-soft:rgba(255,178,122,.5);
    --down:#f0868a;
    --level:0;             /* instantaneous audio level 0..1 */
    --activity:0;          /* sustained-activity accumulator 0..1 */
    --maxw:720px;          /* display cap = source frame width (set by app.js) */
    --ar:16 / 9;           /* frame aspect = source aspect (set by app.js) */
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; color:var(--ink);
    font-family:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN","Segoe UI",system-ui,-apple-system,sans-serif;
    background:radial-gradient(120% 90% at 50% -10%, #1b2142 0%, var(--night) 45%, var(--night-edge) 100%);
    -webkit-font-smoothing:antialiased;
  }
  .stage{
    position:relative; z-index:1;
    min-height:100dvh; display:grid; grid-template-rows:auto 1fr auto;
    padding:max(14px,env(safe-area-inset-top)) 16px max(14px,env(safe-area-inset-bottom));
    gap:14px;
  }

  /* rising red as ongoing activity accumulates — visible from across the room.
     Static paint; ONLY opacity animates (compositor-only) so it never repaints
     the video and causes judder. */
  .alarm{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    opacity:var(--activity); will-change:opacity; transition:opacity .5s ease;
    box-shadow:inset 0 0 170px 44px rgba(238,78,78,.62);
    background:radial-gradient(130% 100% at 50% 50%, transparent 50%, rgba(210,50,50,.3) 100%);
  }

  .bar{display:flex; align-items:center; justify-content:space-between; gap:12px; min-height:34px}
  .spark{width:min(46vw,240px); height:30px; display:block; opacity:.95}

  .status{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 12px 6px 10px; border-radius:999px;
    background:var(--panel); border:1px solid var(--hair); backdrop-filter:blur(8px);
    font-size:12px; font-weight:650; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); white-space:nowrap;
  }
  .status .dot{
    width:8px;height:8px;border-radius:50%; background:var(--glow);
    box-shadow:0 0 9px var(--glow); animation:breathe 2.6s ease-in-out infinite;
  }
  .status.live{color:var(--ink)}
  .status.down{color:var(--down)}
  .status.down .dot{background:var(--down);box-shadow:0 0 9px var(--down);animation:blink 1s steps(2,jump-none) infinite}
  .status.wait .dot{animation:breathe 1.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  .viewport{align-self:center; width:100%; display:flex; align-items:center; justify-content:center}
  /* one box: sized to the source (crisp, never upscaled past native on desktop);
     the video and the veil both fill it, so there's never a nested-box look */
  .frame{
    position:relative; width:min(var(--maxw), 100%); margin:0 auto;
    aspect-ratio:var(--ar); max-height:72dvh;
  }
  /* sound halo: a pre-blurred amber layer behind the video. Only its opacity is
     animated (--level) -> compositor-only, so the video never repaints. */
  .glow{
    position:absolute; inset:0; z-index:0; pointer-events:none; border-radius:20px;
    background:rgba(255,178,122,.72); filter:blur(28px);
    opacity:var(--level); will-change:opacity;
  }
  video{
    position:absolute; inset:0; z-index:1; width:100%; height:100%; object-fit:contain;
    display:block; border-radius:20px; background:#05060d;
    box-shadow:0 0 0 1px var(--hair), 0 18px 50px rgba(0,0,0,.55);
  }
  .veil{
    position:absolute; inset:0; z-index:2; border-radius:20px;
    display:flex; flex-direction:column; gap:16px;
    align-items:center; justify-content:center; text-align:center;
    background:rgba(7,9,18,.82); backdrop-filter:blur(4px);
    color:var(--muted); font-size:14px; transition:opacity .3s ease; padding:20px;
  }
  .veil.hidden{opacity:0; pointer-events:none}
  .spinner{
    width:34px;height:34px;border-radius:50%;
    border:2.5px solid var(--hair); border-top-color:var(--glow); animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .bottom{justify-content:center}
  .ctl{
    -webkit-tap-highlight-color:transparent;
    display:inline-flex; align-items:center; gap:9px;
    padding:12px 20px; border-radius:14px; cursor:pointer;
    background:var(--panel); border:1px solid var(--hair); backdrop-filter:blur(8px);
    color:var(--ink); font:inherit; font-size:14px; font-weight:650;
    transition:border-color .2s ease, transform .08s ease, background .2s ease;
  }
  .ctl:hover{border-color:rgba(255,178,122,.4)}
  .ctl:active{transform:scale(.96)}
  .ctl:focus-visible{outline:2px solid var(--glow); outline-offset:2px}
  .ctl svg{width:20px;height:20px}
  .ctl.on{
    background:linear-gradient(180deg, rgba(255,178,122,.22), rgba(255,178,122,.10));
    border-color:rgba(255,178,122,.55); color:#ffe6cf;
  }
  .ctl .wave{opacity:.3; transition:opacity .2s}
  .ctl.on .wave{opacity:1}

  @media (max-width:520px){
    .stage{gap:10px}
    /* phones: fill the narrow screen (upscale is fine at this size) */
    .frame{width:100%; max-height:none}
    .glow,video,.veil{border-radius:16px}
  }
  @media (prefers-reduced-motion:reduce){
    .status .dot,.spinner{animation:none}
    video,.alarm{transition:none}
  }
</style>
</head>
<body>
<div class="alarm" id="alarm" aria-hidden="true"></div>
<div class="stage">
  <header class="bar">
    <canvas class="spark" id="spark" aria-hidden="true"></canvas>
    <div class="status" id="status" role="status" aria-live="polite">
      <span class="dot"></span><span id="statusText">Connecting</span>
    </div>
  </header>

  <div class="viewport">
    <div class="frame">
      <div class="glow" aria-hidden="true"></div>
      <video id="v" autoplay muted playsinline></video>
      <div class="veil" id="veil">
        <div class="spinner"></div>
        <p id="veilText">Connecting to the camera…</p>
      </div>
    </div>
  </div>

  <footer class="bar bottom">
    <button class="ctl" id="soundBtn" aria-pressed="false" title="Turn sound on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M11 5 6 9H3v6h3l5 4V5Z"/>
        <path class="wave" d="M16 9a4 4 0 0 1 0 6"/>
        <path class="wave" d="M19 6.5a8 8 0 0 1 0 11"/>
      </svg>
      <span>Sound</span>
    </button>
  </footer>
</div>
<script src="/jmuxer.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
